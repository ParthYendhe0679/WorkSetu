services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: worksetu-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false          # set manually in Render dashboard
      - key: GOOGLE_MAPS_API_KEY
        sync: false          # set manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Frontend Static Site ──────────────────────────────────────────────────────
  - type: web
    name: worksetu-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your backend Render URL, e.g. https://worksetu-backend.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
